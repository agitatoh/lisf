<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏝️ A Little Surprise 🩷</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="card">

    <h1>🏝️ Love Island USA Finale 💖</h1>

    <p id="subtitle">
        Since airport Wi-Fi is basically a social experiment...
        <br><br>
        I figured I'd save you all the pain.
        <br>
        Consider this your personal villa delivery service. 💕
    </p>

    <button id="startBtn">
        📱 I GOT A TEXT!
    </button>

    <div id="player" class="hidden">

        <div class="message"></div>

        <video controls>
            <source src="movie.mp4" type="video/mp4">
        </video>

        <p class="footer">
            ❤️ Made with love because no one deserves buffering during the finale.
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
